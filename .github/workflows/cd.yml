name: CD

on:
  #workflow_dispatch:
  push:

jobs:
  deploy:
    name: Deploy application to Kubernetes cluster
    runs-on: ubuntu-latest
    env:
      MANIFESTS_DIRECTORY: /scanlationtracker/manifests
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Configure SSH
      run: |
        install -m 600 -D /dev/null ~/.ssh/id_rsa
        echo "${{ secrets.SSH_K8S_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SSH_K8S_HOST }} > ~/.ssh/known_hosts

    - name: Copy Kubernetes manifests to cluster
      run: |
        export CONTAINER_REGISTRY_PATH=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}
        mkdir substituted-k8s
        for file in k8s/*; do envsubst '${CONTAINER_REGISTRY_PATH}' < $file > substituted-$file; done
        ssh ${{ secrets.SSH_K8S_USER }}@${{ secrets.SSH_K8S_HOST }} "mkdir -p $MANIFESTS_DIRECTORY"
        scp substituted-k8s/* ${{ secrets.SSH_K8S_USER }}@${{ secrets.SSH_K8S_HOST }}:$MANIFESTS_DIRECTORY

    - name: Deploy application to Kubernetes cluster
      run: |
        ssh ${{ secrets.SSH_K8S_USER }}@${{ secrets.SSH_K8S_HOST }} "
          kubectl create configmap seriesupdater-seccomp-config \
            --from-literal=seriesupdater-profile.json='$(cat backend/ScanlationTracker.SeriesUpdater/seccomp-profile.json)' \
            --dry-run=client -o yaml \
          | kubectl apply -f - \
          && kubectl create secret docker-registry container-registry-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.REPOSITORY_OWNER }} \
            --docker-password=${{ secrets.GHCR_K8S_TOKEN }} \
            --dry-run=client -o yaml \
          | kubectl apply -f - \
          && kubectl create secret generic postgresql-secret \
            --from-literal=username=${{ secrets.POSTGRESQL_USER }} \
            --from-literal=password=${{ secrets.POSTGRESQL_PASSWORD }} \
            --dry-run=client -o yaml \
          | kubectl apply -f - \
          && kubectl apply -f $MANIFESTS_DIRECTORY
        "

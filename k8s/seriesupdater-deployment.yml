apiVersion: apps/v1
kind: Deployment
metadata:
  name: seriesupdater-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seriesupdater
  template:
    metadata:
      labels:
        app: seriesupdater
    spec:
      initContainers:
      - name: create-seccomp-profile
        image: busybox:1.37
        command: ["sh", "-c", "cp /etc/seccomp/seriesupdater-profile.json /var/lib/kubelet/seccomp/"]
        volumeMounts:
        - name: seccomp-volume
          mountPath: /etc/seccomp
        - name: host-seccomp-volume
          mountPath: /var/lib/kubelet/seccomp
      - name: migration-seeding-wait
        image: bitnami/kubectl:latest
        command: ["sh", "-c", "kubectl wait --for=condition=complete job/migration-seeding-job"]
      containers:
      - name: seriesupdater
        image: ${CONTAINER_REGISTRY_PATH}/scanlationtracker.seriesupdater:latest
        securityContext:
          seccompProfile:
            type: Localhost
            localhostProfile: seriesupdater-profile.json
        resources:
          requests:
           memory: "512Mi"
        env:
        - name: PostgreSql__Host
          valueFrom:
            configMapKeyRef:
              name: postgresql-config
              key: host
        - name: SecretsDirectory
          value: /etc/secrets
        volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: secret-volume
        secret:
          secretName: postgresql-secret
          items:
          - key: username
            path: PostgreSql__Username
          - key: password
            path: PostgreSql__Password
      - name: seccomp-volume
        configMap:
          name: seriesupdater-seccomp-config
      - name: host-seccomp-volume
        hostPath:
          path: /var/lib/kubelet/seccomp
      imagePullSecrets:
      - name: container-registry-secret
